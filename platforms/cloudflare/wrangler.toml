name = "feedreader"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Explicit (not relying on the workers.dev-matching default) so PR preview
# deploys (.github/workflows/preview-cloudflare.yml, `wrangler versions
# upload --preview-alias`) always get a reachable *.workers.dev URL.
preview_urls = true

[observability]
enabled = true

# Local `wrangler dev` host/port. 8787 is wrangler's own default but is
# already taken by another local service on this machine — override here
# (or per-run with `--ip`/`--port`, e.g. `npm run dev -- --port 8789`).
[dev]
ip = "127.0.0.1"
port = 8788

# Hourly, UTC. Asia/Ho_Chi_Minh (UTC+7, no DST) hourly wall-clock boundaries
# are the same instants as UTC hourly wall-clock boundaries, so no offset
# math is needed (see docs/RUNBOOK.md).
[triggers]
crons = ["0 * * * *"]

[assets]
directory = "../../web-static"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "feedreader"
database_id = "0afd7879-f7cd-4d44-a077-3c40211dee20"
migrations_dir = "migrations"

# Self-binding used to fan out per-source refreshes as fresh Worker
# invocations (see docs/RUNBOOK.md) rather than self-fetching over the
# public internet, which would require hardcoding a hostname.
[[services]]
binding = "SELF"
service = "feedreader"

# Workers AI binding for the "For You" personalization ranker (see
# platforms/cloudflare/src/llmRanker.ts). First-party binding — no secret to
# provision; 10,000 Neurons/day free allocation.
[ai]
binding = "AI"

[vars]
APP_VERSION = "dev"
FEEDREADER_ITEMS_PER_SOURCE = "20"
FEEDREADER_USER_AGENT = "feedreader/0.1"
# Size of the top-similarity slice the LLM polishes per /api/personalize
# call (0 disables the LLM polish pass, serving similarity order on its
# own) — bounds prompt size and Workers AI cost. See src/index.ts's
# handlePersonalize and src/embedder.ts.
FEEDREADER_PERSONALIZE_POLISH_POOL_SIZE = "30"

# REFRESH_SECRET is a secret, not a var — set it with:
#   wrangler secret put REFRESH_SECRET --config platforms/cloudflare/wrangler.toml
