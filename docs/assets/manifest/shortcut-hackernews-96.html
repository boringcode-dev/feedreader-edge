<!doctype html>
<html><head><meta charset="utf-8"><style>
html, body { margin: 0; width: 96px; height: 96px; overflow: hidden; background: transparent; }
body { display: grid; place-items: center; }
.tile {
  width: 96px; height: 96px; border-radius: 26px; overflow: hidden; position: relative;
  background: linear-gradient(180deg, #ff8a3d, #f97316);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.tile::after {
  content: ''; position: absolute; inset: 8px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.10);
}
.logo { position: absolute; inset: 20px; display: grid; place-items: center; }
.logo img { width: 100%; height: 100%; object-fit: contain; }
</style></head>
