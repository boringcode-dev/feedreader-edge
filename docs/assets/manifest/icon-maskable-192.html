<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 192px;
        height: 192px;
        overflow: hidden;
        background: transparent;
      }
      body {
        display: grid;
        place-items: center;
      }
      .tile {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #ff8a3d, #f97316);
      }
      .tile::after {
        content: "";
        position: absolute;
        inset: 10%;
        border-radius: 28%;
        border: 2px solid rgba(255, 255, 255, 0.12);
      }
      .logo {
        position: absolute;
        inset: 18%;
        display: grid;
        place-items: center;
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
